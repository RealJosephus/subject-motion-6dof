TRAIN:
  USE_FP16: true
  FP16_TYPE: bfloat16

MODEL:
  IMAGE_SIZE: [512, 512]
  IMAGE_MEAN: [0.485, 0.456, 0.406]
  IMAGE_STD: [0.229, 0.224, 0.225]
  BACKBONE:
    TYPE: dinov3_vith16plus
    PRETRAINED_WEIGHTS: ''
    FROZEN_STAGES: -1
    DROP_PATH_RATE: 0.1
  DECODER:
    TYPE: sam
    DIM: 1024
    DEPTH: 6
    HEADS: 8
    MLP_DIM: 1024
    DIM_HEAD: 64
    LAYER_SCALE_INIT: 0.0
    DROP_RATE: 0.0
    ATTN_DROP_RATE: 0.0
    DROP_PATH_RATE: 0.0
    FFN_TYPE: origin
    ENABLE_TWOWAY: false
    REPEAT_PE: true
    FROZEN: false
    CONDITION_TYPE: cliff
    USE_INTRIN_CENTER: true
    DO_INTERM_PREDS: false
    DO_INTERM_SUP: false
    DO_KEYPOINT_TOKENS: true
    DO_HAND_DETECT_TOKENS: false
    KEYPOINT_TOKEN_UPDATE: false
    KEYPOINT_TOKEN_UPDATE_COORD_EMB_USE_MLP: false
    DO_KEYPOINT3D_TOKENS: true
  PROMPT_ENCODER:
    ENABLE: true
    MAX_NUM_CLICKS: 1
    PROMPT_KEYPOINTS: mhr70
    FROZEN: false
    MASK_EMBED_TYPE: v2
    MASK_PROMPT: v1
  ENABLE_BODY: false
  ENABLE_HAND: false

TEMPORAL_HEAD:
  INPUT_DIM: 1024
  HIDDEN_DIM: 512
  OUTPUT_DIM: 6
  VISUAL_NUM_LAYERS: 2
  VISUAL_NUM_HEADS: 8
  VISUAL_FFN_DIM: 2048
  NUM_LAYERS: 6
  DROPOUT: 0.1
  OUTPUT_SCALE: 100.0
  INITIAL_VALUE: 50.0
  DETACH_FEEDBACK: false

DATA:
  MAX_LEN: 240
  CHUNK_LEN: 128
  REQUIRE_CFR: true
  CFR_TOLERANCE_MS: 0.5

TRAINING:
  SEED: 42
  FREEZE_BACKBONE: true
  GRADIENT_CHECKPOINTING: true
  BATCH_SIZE: 1
  GRADIENT_ACCUMULATION_STEPS: 8
  NUM_WORKERS: 4
  EPOCHS: 1
  SAVE_EVERY: 2000
  KEEP_CHECKPOINTS: 1
  LOG_EVERY: 1
  VALIDATE_EVERY: 0
  VALIDATION_MAX_BATCHES: 0
  LOSS_TYPE: smooth_l1
  GRAD_CLIP: 1.0

OPTIM:
  TEMPORAL_HEAD_LR: 0.0002
  SAM_DECODER_LR: 0.00002
  BACKBONE_LR: 0.000001
  WEIGHT_DECAY: 0.05
  SCHEDULER: cosine
  WARMUP_STEPS: 1000
  MIN_LR_RATIO: 0.05

WANDB:
  ENABLE: false
  PROJECT: subject-motion-6dof
  NAME:
  MODE:
